name: Dependency Review

on:
  schedule:
    - cron: '0 14 * * 1'
  workflow_dispatch:

jobs:
  dependency_review:
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: '20'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate dependency review
        run: npm run deps:review -- --output artifacts/dependency-review.md

      - name: Publish summary
        run: cat artifacts/dependency-review.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dependency-review
          path: artifacts/dependency-review.md
